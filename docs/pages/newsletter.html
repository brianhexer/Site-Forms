<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup - Site-Forms</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-sm">
        <header class="mb-4 text-center">
            <h1>Subscribe to Our Newsletter</h1>
            <p class="text-muted">Get updates delivered to your inbox</p>
        </header>

        <form id="newsletter-form" class="site-form" 
              data-form-name="newsletter"
              data-recipient="newsletter@example.com"
              data-success-message="Thank you for subscribing! Check your email for confirmation."
              data-error-message="Sorry, there was an error. Please try again.">

            <div class="form-field">
                <label for="news-name">Full Name</label>
                <input type="text" 
                       id="news-name" 
                       name="name" 
                       placeholder="Your name"
                       required>
            </div>

            <div class="form-field">
                <label for="news-email">Email Address</label>
                <input type="email" 
                       id="news-email" 
                       name="email" 
                       placeholder="your@email.com"
                       required>
            </div>

            <div class="form-field">
                <label>What topics interest you?</label>
                <div class="form-check">
                    <input type="checkbox" id="tech" name="interests" value="Technology">
                    <label for="tech">Technology</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="biz" name="interests" value="Business">
                    <label for="biz">Business</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="design" name="interests" value="Design">
                    <label for="design">Design</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="other" name="interests" value="Other">
                    <label for="other">Other</label>
                </div>
            </div>

            <div class="form-field">
                <label class="form-check">
                    <input type="checkbox" name="terms" value="agreed" required>
                    <span>I agree to receive emails from your company</span>
                </label>
            </div>

            <button type="submit" class="btn btn-submit btn-block">Subscribe Now</button>
        </form>
    </div>

    <!-- Form Handler Script -->
    <script src="../js/form-model.js"></script>
    <script src="../js/form-handler.js"></script>

    <!-- EmailJS Configuration -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <script>
        window.EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY';
        window.EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';
        window.EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
    </script>
</body>
</html>
