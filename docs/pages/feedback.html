<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form - Site-Forms</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-md">
        <header class="mb-4">
            <h1>Share Your Feedback</h1>
            <p class="text-muted">Help us improve by telling us what you think</p>
        </header>

        <form id="feedback-form" class="site-form" 
              data-form-name="feedback"
              data-recipient="feedback@example.com"
              data-success-message="Thank you for your feedback! It helps us improve."
              data-error-message="Sorry, we couldn't submit your feedback. Please try again.">

            <div class="form-field">
                <label for="fb-name">Name</label>
                <input type="text" 
                       id="fb-name" 
                       name="name" 
                       placeholder="Your name"
                       required>
            </div>

            <div class="form-field">
                <label for="fb-email">Email Address</label>
                <input type="email" 
                       id="fb-email" 
                       name="email" 
                       placeholder="your@email.com"
                       required>
            </div>

            <div class="form-field">
                <label for="fb-category">Feedback Category</label>
                <select id="fb-category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Bug Report">Bug Report</option>
                    <option value="Feature Request">Feature Request</option>
                    <option value="General Feedback">General Feedback</option>
                    <option value="Complaint">Complaint</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-field">
                <label for="fb-rating">Overall Rating</label>
                <div class="form-check">
                    <input type="radio" id="rating-5" name="rating" value="5" required>
                    <label for="rating-5">⭐⭐⭐⭐⭐ Excellent</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="rating-4" name="rating" value="4">
                    <label for="rating-4">⭐⭐⭐⭐ Good</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="rating-3" name="rating" value="3">
                    <label for="rating-3">⭐⭐⭐ Average</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="rating-2" name="rating" value="2">
                    <label for="rating-2">⭐⭐ Poor</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="rating-1" name="rating" value="1">
                    <label for="rating-1">⭐ Very Poor</label>
                </div>
            </div>

            <div class="form-field">
                <label for="fb-message">Your Feedback</label>
                <textarea id="fb-message" 
                          name="message" 
                          placeholder="Please tell us your thoughts..."
                          minlength="10"
                          required></textarea>
            </div>

            <div class="form-field">
                <label class="form-check">
                    <input type="checkbox" name="followup" value="yes">
                    <span>Feel free to follow up with me</span>
                </label>
            </div>

            <button type="submit" class="btn btn-submit btn-lg btn-block">Submit Feedback</button>
        </form>
    </div>

    <!-- Form Handler Script -->
    <script src="../js/form-model.js"></script>
    <script src="../js/form-handler.js"></script>

    <!-- EmailJS Configuration -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <script>
        window.EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY';
        window.EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';
        window.EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
    </script>
</body>
</html>
