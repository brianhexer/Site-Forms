<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Site-Forms</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-md">
        <header class="mb-4">
            <h1>Contact Us</h1>
            <p class="text-muted">We'd love to hear from you. Send us a message!</p>
        </header>

        <form id="contact-form" class="site-form" 
              data-form-name="contact"
              data-recipient="contact@example.com"
              data-success-message="Thank you! We received your message and will get back to you soon."
              data-error-message="Sorry, there was an error sending your message. Please try again.">

            <div class="form-field">
                <label for="contact-name">Full Name</label>
                <input type="text" 
                       id="contact-name" 
                       name="name" 
                       placeholder="John Doe"
                       required>
            </div>

            <div class="form-row">
                <div class="form-field">
                    <label for="contact-email">Email Address</label>
                    <input type="email" 
                           id="contact-email" 
                           name="email" 
                           placeholder="john@example.com"
                           required>
                </div>

                <div class="form-field">
                    <label for="contact-phone">Phone Number</label>
                    <input type="tel" 
                           id="contact-phone" 
                           name="phone" 
                           placeholder="(555) 123-4567">
                </div>
            </div>

            <div class="form-field">
                <label for="contact-subject">Subject</label>
                <input type="text" 
                       id="contact-subject" 
                       name="subject" 
                       placeholder="What is this about?"
                       required>
            </div>

            <div class="form-field">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" 
                          name="message" 
                          placeholder="Your message here..."
                          required></textarea>
            </div>

            <div class="form-field">
                <label class="form-check">
                    <input type="checkbox" name="subscribe" value="yes">
                    <span>Subscribe to our newsletter</span>
                </label>
            </div>

            <button type="submit" class="btn btn-submit btn-lg btn-block">Send Message</button>
        </form>
    </div>

    <!-- Form Handler Script -->
    <script src="../js/form-model.js"></script>
    <script src="../js/form-handler.js"></script>

    <!-- EmailJS Configuration (if using EmailJS) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <script>
        // Replace with your EmailJS credentials
        // Get these from: https://www.emailjs.com
        window.EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY';
        window.EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';
        window.EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
    </script>
</body>
</html>
